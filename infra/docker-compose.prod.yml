version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: aissisted
      POSTGRES_PASSWORD: aissisted_dev
      POSTGRES_DB: aissisted
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aissisted"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:

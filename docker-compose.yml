version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: aissisted
      POSTGRES_PASSWORD: aissisted
      POSTGRES_DB: aissisted
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aissisted"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql://aissisted:aissisted@postgres:5432/aissisted"
      PORT: "4000"
      API_HOST: "0.0.0.0"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - api_data:/app/apps/api/data

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:4000"
    depends_on:
      - api

volumes:
  pgdata:
  api_data:

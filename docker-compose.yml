version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: aissisted
      POSTGRES_PASSWORD: aissisted
      POSTGRES_DB: aissisted
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:

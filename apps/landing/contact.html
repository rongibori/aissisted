<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Contact — aissisted</title>
<meta name="description" content="Get in touch with aissisted."/>
<meta name="robots" content="noindex"/>
<link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Serif:ital,wght@0,400;1,400;1,500&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--red:#EE2B37;--ink:#1C1C1E;--mute:rgba(28,28,30,0.56);--hair:rgba(11,29,58,0.06);--white:#FFFFFF}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--white);color:var(--ink);font-family:"IBM Plex Sans",system-ui,sans-serif;-webkit-font-smoothing:antialiased;line-height:1.55}
  a{color:inherit;text-decoration:underline;text-decoration-thickness:1px;text-underline-offset:3px}
  main{max-width:680px;margin:0 auto;padding:80px 40px 120px}
  header{padding:22px 40px;border-bottom:1px solid var(--hair);display:flex;align-items:center;justify-content:space-between}
  header img{height:22px}
  header a.back{font-family:"IBM Plex Mono",ui-monospace,monospace;font-size:11px;letter-spacing:1.4px;text-transform:uppercase;color:var(--mute);text-decoration:none}
  .kicker{font-family:"IBM Plex Mono",ui-monospace,monospace;font-size:11px;letter-spacing:2.2px;text-transform:uppercase;color:var(--red)}
  h1{font-weight:700;font-size:48px;letter-spacing:-1px;margin:18px 0 28px;line-height:1.05}
  h2{font-weight:600;font-size:20px;margin:40px 0 10px}
  p{color:var(--ink);margin:0 0 16px;max-width:60ch}
  .email{font-size:22px;font-weight:500}
</style>
</head>
<body>
<header>
  <a href="/" aria-label="aissisted"><img src="/aissisted-logo.svg" alt="aissisted"/></a>
  <a class="back" href="/">← Back</a>
</header>
<main>
  <div class="kicker">Contact</div>
  <h1>Reach us.</h1>
  <p class="email"><a href="mailto:hello@aissisted.me">hello@aissisted.me</a></p>

  <h2>Press</h2>
  <p>For press inquiries, use the address above with the subject line "Press".</p>

  <h2>Partnerships</h2>
  <p>Health systems, wearable partners, and research collaborators — we'd like to hear from you.</p>

  <h2>Waitlist</h2>
  <p><a href="/#reserve">Reserve your formula on the home page →</a></p>
</main>
</body>
</html>
